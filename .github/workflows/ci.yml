name: CI - Test and Validate

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-only:
    name: "ci: docs-only"
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.detect.outputs.docs-only }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect docs-only changes
        id: detect
        uses: wphillipmoore/standard-actions/actions/docs-only-detect@develop

  standards-compliance:
    name: "ci: standards-compliance"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate standards
        uses: wphillipmoore/standard-actions/actions/standards-compliance@develop

  dependency-audit:
    name: "ci: dependency-audit"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/wphillipmoore/dev-ruby:3.4
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: bundle install --jobs 4

      - name: Run bundle-audit (vulnerability check)
        run: bundle exec bundle-audit check --update

      - name: Run license compliance check
        run: |
          gem install license_finder --no-document
          license_finder --decisions-file=doc/dependency_decisions.yml || true

  release-gates:
    name: "release: gates"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/wphillipmoore/dev-ruby:3.4
    steps:
      - name: Skip on non-PR events
        if: github.event_name != 'pull_request'
        run: echo "Not a pull request; skipping release gates."

      - name: Checkout code
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Version divergence gate (PRs targeting develop)
        if: github.event_name == 'pull_request' && github.base_ref == 'develop'
        uses: wphillipmoore/standard-actions/actions/release-gates/version-divergence@develop
        with:
          head-version-command: ruby -e "require_relative 'lib/mq/rest/admin/version'; puts MQ::REST::Admin::VERSION"
          main-version-command: git show origin/main:lib/mq/rest/admin/version.rb | ruby -e "eval(STDIN.read); puts MQ::REST::Admin::VERSION"

  test-and-validate:
    name: "test: unit"
    runs-on: ubuntu-latest
    needs: docs-only
    strategy:
      matrix:
        ruby-version: ["3.2", "3.3", "3.4"]
    container:
      image: ghcr.io/wphillipmoore/dev-ruby:${{ matrix.ruby-version }}

    steps:
      - name: Docs-only short-circuit
        if: needs.docs-only.outputs.docs-only == 'true'
        run: echo "Docs-only changes detected; skipping test-and-validate."

      - name: Checkout code
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: actions/checkout@v6

      - name: Fetch base branch for version checks
        if: github.event_name == 'pull_request' && needs.docs-only.outputs.docs-only != 'true'
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Install dependencies
        if: needs.docs-only.outputs.docs-only != 'true'
        run: bundle install --jobs 4

      - name: Run RuboCop
        if: needs.docs-only.outputs.docs-only != 'true'
        run: bundle exec rubocop

      - name: Run tests with coverage
        if: needs.docs-only.outputs.docs-only != 'true'
        run: bundle exec rake test

  type-check:
    name: "test: type-check"
    runs-on: ubuntu-latest
    needs: docs-only
    container:
      image: ghcr.io/wphillipmoore/dev-ruby:3.4

    steps:
      - name: Docs-only short-circuit
        if: needs.docs-only.outputs.docs-only == 'true'
        run: echo "Docs-only changes detected; skipping type-check."

      - name: Checkout code
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: actions/checkout@v6

      - name: Install dependencies
        if: needs.docs-only.outputs.docs-only != 'true'
        run: bundle install --jobs 4

      - name: Run Steep type check
        if: needs.docs-only.outputs.docs-only != 'true'
        run: bundle exec steep check

  codeql:
    name: "security: codeql"
    runs-on: ubuntu-latest
    needs: docs-only
    permissions:
      security-events: write
    steps:
      - name: Docs-only short-circuit
        if: needs.docs-only.outputs.docs-only == 'true'
        run: echo "Docs-only changes detected; skipping CodeQL."

      - name: Checkout code
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: actions/checkout@v6

      - name: Run CodeQL analysis
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: wphillipmoore/standard-actions/actions/security/codeql@develop
        with:
          language: ruby

  trivy:
    name: "security: trivy"
    runs-on: ubuntu-latest
    needs: docs-only
    permissions:
      security-events: write
    steps:
      - name: Docs-only short-circuit
        if: needs.docs-only.outputs.docs-only == 'true'
        run: echo "Docs-only changes detected; skipping Trivy."

      - name: Checkout code
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scan
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: wphillipmoore/standard-actions/actions/security/trivy@develop
        with:
          scan-type: fs

  semgrep:
    name: "security: semgrep"
    runs-on: ubuntu-latest
    needs: docs-only
    permissions:
      security-events: write
    steps:
      - name: Docs-only short-circuit
        if: needs.docs-only.outputs.docs-only == 'true'
        run: echo "Docs-only changes detected; skipping Semgrep."

      - name: Checkout code
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: actions/checkout@v6

      - name: Run Semgrep SAST scan
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: wphillipmoore/standard-actions/actions/security/semgrep@develop
        with:
          language: ruby

  integration-tests:
    name: "test: integration (${{ matrix.ruby-version }})"
    runs-on: ubuntu-latest
    needs: docs-only
    strategy:
      matrix:
        include:
          - ruby-version: "3.2"
            project-suffix: "3-2"
            qm1-rest-port: "9459"
            qm2-rest-port: "9460"
          - ruby-version: "3.3"
            project-suffix: "3-3"
            qm1-rest-port: "9461"
            qm2-rest-port: "9462"
          - ruby-version: "3.4"
            project-suffix: "3-4"
            qm1-rest-port: "9463"
            qm2-rest-port: "9464"

    steps:
      - name: Docs-only short-circuit
        if: needs.docs-only.outputs.docs-only == 'true'
        run: echo "Docs-only changes detected; skipping integration tests."

      - name: Checkout code
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: actions/checkout@v6

      - name: Set up Ruby
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Setup MQ environment
        if: needs.docs-only.outputs.docs-only != 'true'
        uses: wphillipmoore/mq-rest-admin-dev-environment/.github/actions/setup-mq@main
        with:
          project-name: mq-rest-admin-ruby-${{ matrix.project-suffix }}
          qm1-rest-port: ${{ matrix.qm1-rest-port }}
          qm2-rest-port: ${{ matrix.qm2-rest-port }}

      - name: Run integration tests
        if: needs.docs-only.outputs.docs-only != 'true'
        env:
          MQ_REST_BASE_URL: https://localhost:${{ matrix.qm1-rest-port }}/ibmmq/rest/v2
          MQ_REST_BASE_URL_QM2: https://localhost:${{ matrix.qm2-rest-port }}/ibmmq/rest/v2
        run: |
          MQ_REST_ADMIN_RUBY_RUN_INTEGRATION=1 \
          bundle exec rake integration
