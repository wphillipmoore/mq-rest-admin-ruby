name: CI

on:
  pull_request:
  workflow_call:
    inputs:
      ruby-versions:
        type: string
        default: '["3.2", "3.3", "3.4"]'
      integration-matrix:
        type: string
        default: '[{"ruby-version":"3.2","project-suffix":"3-2","qm1-rest-port":"9475","qm2-rest-port":"9476","qm1-mq-port":"1446","qm2-mq-port":"1447"},{"ruby-version":"3.3","project-suffix":"3-3","qm1-rest-port":"9477","qm2-rest-port":"9478","qm1-mq-port":"1448","qm2-mq-port":"1449"},{"ruby-version":"3.4","project-suffix":"3-4","qm1-rest-port":"9479","qm2-rest-port":"9480","qm1-mq-port":"1450","qm2-mq-port":"1451"}]'
      run-security:
        type: string
        default: 'true'
      run-release:
        type: string
        default: 'true'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  quality:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-quality.yml@v1.5
    with:
      language: ruby
      versions: ${{ inputs.ruby-versions || '["3.2", "3.3", "3.4"]' }}

  test:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-test.yml@v1.5
    with:
      language: ruby
      versions: ${{ inputs.ruby-versions || '["3.2", "3.3", "3.4"]' }}

  audit:
    name: "audit / dependencies / ${{ matrix.ruby-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ${{ fromJSON(inputs.ruby-versions || '["3.2", "3.3", "3.4"]') }}
    container:
      image: ghcr.io/wphillipmoore/dev-ruby:${{ matrix.ruby-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: bundle install --jobs 4

      - name: Run bundle-audit
        run: bundle exec bundle-audit check --update

      - name: Run license compliance check
        run: |
          gem install license_finder --no-document
          license_finder --decisions-file=doc/dependency_decisions.yml

  integration-tests:
    name: "test / integration / ${{ matrix.ruby-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.integration-matrix || '[{"ruby-version":"3.2","project-suffix":"3-2","qm1-rest-port":"9475","qm2-rest-port":"9476","qm1-mq-port":"1446","qm2-mq-port":"1447"},{"ruby-version":"3.3","project-suffix":"3-3","qm1-rest-port":"9477","qm2-rest-port":"9478","qm1-mq-port":"1448","qm2-mq-port":"1449"},{"ruby-version":"3.4","project-suffix":"3-4","qm1-rest-port":"9479","qm2-rest-port":"9480","qm1-mq-port":"1450","qm2-mq-port":"1451"}]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Setup MQ environment
        uses: wphillipmoore/mq-rest-admin-dev-environment/.github/actions/setup-mq@main
        with:
          project-name: mqrest-ruby-${{ matrix.project-suffix }}
          qm1-rest-port: ${{ matrix.qm1-rest-port }}
          qm2-rest-port: ${{ matrix.qm2-rest-port }}
          qm1-mq-port: ${{ matrix.qm1-mq-port }}
          qm2-mq-port: ${{ matrix.qm2-mq-port }}

      - name: Run integration tests
        env:
          MQ_REST_BASE_URL: https://localhost:${{ matrix.qm1-rest-port }}/ibmmq/rest/v2
          MQ_REST_BASE_URL_QM2: https://localhost:${{ matrix.qm2-rest-port }}/ibmmq/rest/v2
        run: |
          MQ_REST_ADMIN_RUN_INTEGRATION=1 \
          MQ_SKIP_LIFECYCLE=1 \
          bundle exec rake integration

  security:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-security.yml@v1.5
    with:
      language: ruby
      run-standards: ${{ inputs.run-release || 'true' }}
      run-security: ${{ inputs.run-security || 'true' }}
    permissions:
      contents: read
      security-events: write

  release:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-release.yml@v1.5
    with:
      language: ruby
      run-release: ${{ inputs.run-release != 'false' }}
